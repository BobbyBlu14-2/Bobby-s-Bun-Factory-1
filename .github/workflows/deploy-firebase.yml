name: Build and Deploy to Firebase & Cloud Run

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Containerize and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-west2-docker.pkg.dev --quiet

      - name: Create Artifact Registry Repository (if not exists)
        run: |
          gcloud artifacts repositories describe bobbys-bun-factory --location=us-west2 || \
          gcloud artifacts repositories create bobbys-bun-factory \
            --repository-format=docker \
            --location=us-west2 \
            --description="Bobby's Bun Factory Docker repository"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies & Build Frontend
        run: |
          npm ci
          npm run build

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: us-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bobbys-bun-factory/app:latest

      - name: Remove Cloud Run Sources Annotation
        run: |
          if gcloud run services describe bobby-s-bun-factory --region=us-west2 --format=json > service.json 2>/dev/null; then
            echo "Service bobby-s-bun-factory exists. Checking for conflicting annotations..."
            python3 -c "
          import json, sys
          try:
              with open('service.json') as f:
                  data = json.load(f)
              modified = False
              # Remove from service metadata annotations
              if 'metadata' in data and 'annotations' in data['metadata']:
                  for key in ['run.googleapis.com/sources', 'run.googleapis.com/source-image']:
                      if key in data['metadata']['annotations']:
                          data['metadata']['annotations'].pop(key)
                          modified = True
              # Remove from template metadata annotations
              if 'spec' in data and 'template' in data['spec']:
                  template = data['spec']['template']
                  if 'metadata' in template and 'annotations' in template['metadata']:
                      for key in ['run.googleapis.com/sources', 'run.googleapis.com/source-image']:
                          if key in template['metadata']['annotations']:
                              template['metadata']['annotations'].pop(key)
                              modified = True
              if modified:
                  print('Conflicting sources annotations found and removed. Preparing clean JSON for replacement.')
                  data.pop('status', None)
                  if 'metadata' in data:
                      for field in ['uid', 'resourceVersion', 'generation', 'creationTimestamp']:
                          data['metadata'].pop(field, None)
                  with open('service-clean.json', 'w') as f:
                      json.dump(data, f, indent=2)
                  sys.exit(0)
              else:
                  print('No conflicting sources annotations found.')
                  sys.exit(1)
          except Exception as e:
              print(f'Error processing configuration: {e}')
              sys.exit(2)
          " && gcloud run services replace service-clean.json --region=us-west2 || echo "No replacement needed or service annotations are already clean."
          else
            echo "Service bobby-s-bun-factory does not exist yet. Skipping annotation cleanup."
          fi

      - name: Deploy to Cloud Run
        id: deploy-cloudrun
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: bobby-s-bun-factory
          image: us-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bobbys-bun-factory/app:latest
          region: us-west2
          flags: --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
            PORT=3000
            SQUARE_ACCESS_TOKEN=${{ secrets.SQUARE_ACCESS_TOKEN }}
            SQUARE_APPLICATION_ID=${{ secrets.SQUARE_APPLICATION_ID }}
            SQUARE_LOCATION_ID=${{ secrets.SQUARE_LOCATION_ID }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GOOGLE_SHEET_WEBHOOK_URL=${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy --only hosting --project ${{ secrets.GCP_PROJECT_ID }} --token "${{ secrets.FIREBASE_TOKEN }}"
